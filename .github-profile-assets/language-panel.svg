<svg xmlns="http://www.w3.org/2000/svg" width="780" height="248" viewBox="0 0 780 248" role="img" aria-label="Most used languages">
  <style>
    .card { fill: #f8fafc; stroke: #dbe3ee; stroke-width: 1; }
    .track { fill: #e8eef6; }
    .label { font: 600 16px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; fill: #334155; }
    .value { font: 700 16px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; fill: #0f172a; }
    .muted { font: 500 16px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; fill: #64748b; }
  </style>

  <rect x="1" y="1" width="778" height="246" rx="18" class="card"/>
  <text x="28" y="36" class="value">Most Used Languages</text>
  <text x="28" y="60" class="muted">Tracked source mix across current local project repos.</text>

  <defs>
    <clipPath id="lang-bar">
      <rect x="28" y="78" width="724" height="22" rx="11" ry="11"/>
    </clipPath>
  </defs>

  <rect x="28" y="78" width="724" height="22" rx="11" class="track"/>
  <g clip-path="url(#lang-bar)">
    <rect x="28" y="78" width="310.09" height="22" fill="#3178C6"/>
    <rect x="338.09" y="78" width="245.44" height="22" fill="#FFD43B"/>
    <rect x="583.53" y="78" width="142.15" height="22" fill="#A855F7"/>
    <rect x="725.68" y="78" width="16.15" height="22" fill="#F97316"/>
    <rect x="741.83" y="78" width="3.84" height="22" fill="#8B5E3C"/>
    <rect x="745.67" y="78" width="3.26" height="22" fill="#1572B6"/>
    <rect x="748.93" y="78" width="3.11" height="22" fill="#F7DF1E"/>
  </g>

  <circle cx="40" cy="136" r="8" fill="#3178C6"/>
  <text x="58" y="142" class="label">TypeScript</text>
  <text x="188" y="142" class="value">42.83%</text>

  <circle cx="400" cy="136" r="8" fill="#F97316"/>
  <text x="418" y="142" class="label">HTML</text>
  <text x="490" y="142" class="value">2.23%</text>

  <circle cx="40" cy="178" r="8" fill="#FFD43B"/>
  <text x="58" y="184" class="label">Python</text>
  <text x="160" y="184" class="value">33.90%</text>

  <circle cx="400" cy="178" r="8" fill="#8B5E3C"/>
  <text x="418" y="184" class="label">Shell</text>
  <text x="492" y="184" class="value">0.53%</text>

  <circle cx="40" cy="220" r="8" fill="#A855F7"/>
  <text x="58" y="226" class="label">MQL4</text>
  <text x="146" y="226" class="value">19.64%</text>

  <circle cx="400" cy="220" r="8" fill="#1572B6"/>
  <text x="418" y="226" class="label">CSS</text>
  <text x="482" y="226" class="value">0.45%</text>

  <circle cx="590" cy="220" r="8" fill="#F7DF1E"/>
  <text x="608" y="226" class="label">JavaScript</text>
  <text x="722" y="226" text-anchor="end" class="value">0.43%</text>
</svg>
