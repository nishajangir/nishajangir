<svg xmlns="http://www.w3.org/2000/svg" width="780" height="250" viewBox="0 0 780 250" role="img" aria-label="Most used languages">
  <style>
    .axis { stroke: #d7e3ef; stroke-width: 2; }
    .tick { font: 700 13px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; fill: #d7e3ef; }
    .label { font: 700 16px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; fill: #ffffff; }
    .value { font: 700 15px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; fill: #ffffff; }
  </style>

  <line x1="78" y1="24" x2="78" y2="210" class="axis"/>

  <text x="28" y="214" class="tick">0%</text>
  <text x="18" y="163" class="tick">10%</text>
  <text x="18" y="112" class="tick">20%</text>
  <text x="18" y="61" class="tick">30%</text>
  <text x="18" y="28" class="tick">40%</text>

  <rect x="116" y="34" width="44" height="176" rx="12" fill="#3b7bc3"/>
  <text x="136" y="27" text-anchor="middle" class="value">42.83%</text>
  <text x="136" y="238" text-anchor="middle" class="label">TypeScript</text>

  <rect x="212" y="71" width="50" height="139" rx="12" fill="#ffd24a"/>
  <text x="234" y="50" text-anchor="middle" class="value">33.90%</text>
  <text x="234" y="238" text-anchor="middle" class="label">Python</text>

  <rect x="314" y="108" width="52" height="102" rx="12" fill="#9d4edd"/>
  <text x="336" y="99" text-anchor="middle" class="value">19.64%</text>
  <text x="336" y="238" text-anchor="middle" class="label">MQL4</text>

  <rect x="429" y="201" width="55" height="9" rx="4.5" fill="#ff7a18"/>
  <text x="456" y="192" text-anchor="middle" class="value">2.23%</text>
  <text x="456" y="238" text-anchor="middle" class="label">HTML</text>

  <rect x="518" y="207" width="52" height="3" rx="1.5" fill="#9a6a3f"/>
  <text x="544" y="201" text-anchor="middle" class="value">0.53%</text>
  <text x="544" y="238" text-anchor="middle" class="label">Shell</text>

  <rect x="610" y="206" width="52" height="4" rx="2" fill="#1f78c1"/>
  <text x="636" y="201" text-anchor="middle" class="value">0.45%</text>
  <text x="636" y="238" text-anchor="middle" class="label">CSS</text>

  <rect x="696" y="207" width="52" height="3" rx="1.5" fill="#f2d21b"/>
  <text x="722" y="201" text-anchor="middle" class="value">0.43%</text>
  <text x="722" y="238" text-anchor="middle" class="label">JavaScript</text>
